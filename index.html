<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Симон — РП</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700&display=swap');
  :root {
    --bg:#0d0f1a; --surface:#151727; --card:#1c1f35;
    --border:#2a2e4a; --accent:#7c5cfc; --accent2:#fc5c9c;
    --text:#e8eaff; --muted:#6b6e99; --green:#22c55e;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'Nunito',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:linear-gradient(rgba(124,92,252,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,92,252,0.04) 1px,transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .app { position:relative; z-index:1; max-width:480px; margin:0 auto; padding:16px 12px 100px; }

  .header { display:flex; align-items:center; gap:10px; padding:16px 0 20px; }
  .hicon { width:44px; height:44px; background:linear-gradient(135deg,var(--accent),var(--accent2)); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:22px; box-shadow:0 0 20px rgba(124,92,252,0.5); flex-shrink:0; }
  .htitle { font-family:'Unbounded',sans-serif; font-size:18px; font-weight:900; background:linear-gradient(90deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .hsub { font-size:11px; color:var(--muted); margin-top:2px; }

  .tabs { display:flex; background:var(--surface); border-radius:14px; padding:4px; gap:4px; margin-bottom:20px; border:1px solid var(--border); }
  .tab { flex:1; padding:9px 6px; border-radius:10px; border:none; background:none; color:var(--muted); font-family:'Nunito',sans-serif; font-size:13px; font-weight:700; cursor:pointer; transition:all .2s; }
  .tab.active { background:linear-gradient(135deg,var(--accent),#5a3dc4); color:#fff; box-shadow:0 4px 14px rgba(124,92,252,0.4); }

  .block { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:12px; }
  .slabel { font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }

  .field { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px 14px; color:var(--text); font-family:'Nunito',sans-serif; font-size:15px; font-weight:700; outline:none; transition:border-color .2s; }
  .field:focus { border-color:var(--accent); }
  .field::placeholder { color:var(--muted); font-weight:600; font-size:13px; }

  .hint { font-size:11px; color:var(--muted); margin-top:6px; line-height:1.5; }
  .hint b { color:var(--accent2); }

  .egrid { display:flex; flex-wrap:wrap; gap:8px; }
  .ebtn { width:44px; height:44px; border-radius:12px; border:1px solid var(--border); background:var(--bg); font-size:22px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .15s; -webkit-tap-highlight-color:transparent; }
  .ebtn.sel { border-color:var(--accent2); background:rgba(252,92,156,0.15); transform:scale(1.15); box-shadow:0 0 10px rgba(252,92,156,0.4); }
  .ebtn:active { transform:scale(0.88) !important; }

  .preview { background:rgba(124,92,252,0.08); border:1px solid rgba(124,92,252,0.25); border-radius:14px; padding:14px; margin-bottom:12px; font-size:14px; font-weight:700; line-height:1.7; color:var(--text); min-height:54px; }
  .preview .ph { color:var(--muted); font-weight:600; font-size:13px; }
  .preview .nm { color:var(--accent); }
  .preview .tg { color:var(--accent2); }

  .btn-save {
    width:100%; padding:14px; background:linear-gradient(135deg,var(--green),#16a34a);
    border:none; border-radius:14px; color:#fff;
    font-family:'Unbounded',sans-serif; font-size:13px; font-weight:700;
    cursor:pointer; box-shadow:0 6px 20px rgba(34,197,94,0.4);
    transition:all .2s;
  }
  .btn-save:active { transform:scale(0.97); }
  .btn-save:disabled { background:var(--border); box-shadow:none; color:var(--muted); cursor:not-allowed; transform:none; }

  /* Мої РП */
  .feed-empty { text-align:center; padding:50px 20px; color:var(--muted); }
  .feed-empty-icon { font-size:48px; margin-bottom:12px; }
  .rp-item { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:14px; margin-bottom:10px; animation:fin .3s ease; }
  @keyframes fin { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
  .rp-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
  .rp-name { font-family:'Unbounded',sans-serif; font-size:12px; font-weight:700; color:var(--accent); }
  .rp-emoji { font-size:18px; }
  .rp-text { font-size:13px; color:#c8cbf0; line-height:1.5; margin-bottom:8px; }
  .rp-usage { font-size:11px; color:var(--muted); background:var(--bg); border-radius:6px; padding:4px 8px; display:inline-block; margin-bottom:8px; }
  .rp-usage code { color:var(--accent2); }
  .rp-btns { display:flex; gap:8px; }
  .rbtn { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:5px 12px; color:var(--muted); font-size:12px; cursor:pointer; font-family:'Nunito',sans-serif; font-weight:700; transition:all .15s; }
  .rbtn.green { border-color:var(--green); color:var(--green); background:rgba(34,197,94,0.1); }

  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--card); border:1px solid var(--green); border-radius:12px; padding:10px 20px; font-size:13px; font-weight:700; opacity:0; transition:all .3s; z-index:100; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  .bottom-nav { position:fixed; bottom:0; left:0; right:0; background:rgba(13,15,26,0.96); backdrop-filter:blur(12px); border-top:1px solid var(--border); padding:10px 20px 16px; display:flex; justify-content:space-around; z-index:50; }
  .nitem { display:flex; flex-direction:column; align-items:center; gap:4px; font-size:10px; color:var(--muted); font-weight:700; cursor:pointer; background:none; border:none; font-family:'Nunito',sans-serif; padding:4px 12px; }
  .nitem span { font-size:20px; }
  .nitem.active { color:var(--accent); }
  .badge { display:inline-flex; background:var(--accent2); color:#fff; font-size:9px; font-weight:900; padding:1px 5px; border-radius:6px; margin-left:4px; vertical-align:middle; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="hicon">⚔️</div>
    <div>
      <div class="htitle">СИМОН РП</div>
      <div class="hsub">Створення РП команд</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('create')" id="tab-create">➕ Нова команда</button>
    <button class="tab" onclick="switchTab('feed')" id="tab-feed">📜 Мої РП <span class="badge" id="fcnt">0</span></button>
  </div>

  <!-- CREATE -->
  <div id="page-create">

    <!-- Назва команди -->
    <div class="block">
      <div class="slabel">🏷️ Назва команди</div>
      <input class="field" id="f-name" placeholder="Наприклад: кусь, обійми, атака…" oninput="upPrev()">
      <div class="hint">Саме це слово пишеш в групі щоб викликати РП</div>
    </div>

    <!-- Текст -->
    <div class="block">
      <div class="slabel">✏️ Текст РП</div>
      <input class="field" id="f-text" placeholder="Наприклад: {від} вкусив {до} за вухо" oninput="upPrev()">
      <div class="hint"><b>{від}</b> — твоє ім'я &nbsp;|&nbsp; <b>{до}</b> — ім'я цілі</div>
    </div>

    <!-- Емодзі -->
    <div class="block">
      <div class="slabel">😊 Емодзі</div>
      <div class="egrid" id="emo-grid"></div>
    </div>

    <!-- Превью -->
    <div class="block" style="margin-bottom:12px">
      <div class="slabel">👁 Превью в чаті</div>
      <div class="preview" id="preview"><span class="ph">Заповни поля…</span></div>
    </div>

    <button class="btn-save" id="btn-save" onclick="saveCmd()" disabled>
      💾 Зберегти команду в бота
    </button>

  </div>

  <!-- FEED -->
  <div id="page-feed" style="display:none">
    <div class="slabel">Мої збережені РП</div>
    <div id="feed-list">
      <div class="feed-empty">
        <div class="feed-empty-icon">🎭</div>
        <div>Ще немає команд.<br>Створи першу!</div>
      </div>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nitem active" id="nav-create" onclick="switchTab('create')"><span>➕</span>Нова</button>
  <button class="nitem" id="nav-feed" onclick="switchTab('feed')"><span>📜</span>Мої РП</button>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

const EMOJIS = ['💕','🥰','😘','💋','🫂','❤️','👊','💥','⚔️','😤','🔥','💢','😡','🦵','💪','🌿','💊','🛏️','🌙','☕','🎉','😜','🎈','🥳','😂','💃','🕺','😢','😔','💔','😭','⚡','🎭','🌟','💫','🔮','🎯','🌀','👀','😏','🤗','🫶','✨','🩷','😈','🫠','🤭','💀','🐾','🌸'];

let selEmo = null;
let localFeed = JSON.parse(localStorage.getItem('simon_rp_cmds') || '[]');

// Ім'я з Telegram
let myName = 'Влад';
if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
  myName = tg.initDataUnsafe.user.first_name || 'Влад';
}

// Рендер емодзі
document.getElementById('emo-grid').innerHTML = EMOJIS.map(e =>
  `<button class="ebtn" onclick="pickEmo('${e}',this)">${e}</button>`
).join('');
document.getElementById('fcnt').textContent = localFeed.length;

function pickEmo(e, btn) {
  selEmo = e;
  document.querySelectorAll('.ebtn').forEach(b => b.classList.remove('sel'));
  btn.classList.add('sel');
  upPrev();
  upBtn();
}

function upPrev() {
  const name = document.getElementById('f-name').value.trim().toLowerCase();
  const text = document.getElementById('f-text').value.trim();
  const box  = document.getElementById('preview');

  if (!name && !text) {
    box.innerHTML = '<span class="ph">Заповни поля…</span>';
    upBtn(); return;
  }

  const emo     = selEmo || '🎭';
  const preview = (text || '...')
    .replace(/{від}/g,  `<span class="nm">${myName}</span>`)
    .replace(/{до}/g,   `<span class="tg">@Валя</span>`)
    .replace(/{from}/g, `<span class="nm">${myName}</span>`)
    .replace(/{to}/g,   `<span class="tg">@Валя</span>`);

  box.innerHTML = emo + ' ' + preview;
  upBtn();
}

function upBtn() {
  const name = document.getElementById('f-name').value.trim();
  const text = document.getElementById('f-text').value.trim();
  document.getElementById('btn-save').disabled = !(name && text && selEmo);
}

function saveCmd() {
  const name = document.getElementById('f-name').value.trim().toLowerCase();
  const text = document.getElementById('f-text').value.trim();
  if (!name || !text || !selEmo) return;

  // Відправляємо в бота через sendData
  const payload = JSON.stringify({
    action: 'save_rp',
    name:   name,
    text:   text,
    emoji:  selEmo,
  });

  if (tg && tg.sendData) {
    tg.sendData(payload);
    // Зберігаємо локально щоб показати в списку
    localFeed = localFeed.filter(x => x.name !== name);
    localFeed.unshift({ name, text, emoji: selEmo });
    localStorage.setItem('simon_rp_cmds', JSON.stringify(localFeed));
    document.getElementById('fcnt').textContent = localFeed.length;
    // Бот закриє застосунок після sendData
  } else {
    // Якщо не в Telegram — показуємо що збережено локально
    localFeed = localFeed.filter(x => x.name !== name);
    localFeed.unshift({ name, text, emoji: selEmo });
    localStorage.setItem('simon_rp_cmds', JSON.stringify(localFeed));
    document.getElementById('fcnt').textContent = localFeed.length;
    showToast('✅ Збережено локально (тест)');
  }
}

function renderFeed() {
  const el = document.getElementById('feed-list');
  if (!localFeed.length) {
    el.innerHTML = `<div class="feed-empty"><div class="feed-empty-icon">🎭</div><div>Ще немає команд.<br>Створи першу!</div></div>`;
    return;
  }
  el.innerHTML = localFeed.map(r => `
    <div class="rp-item">
      <div class="rp-top">
        <span class="rp-name">${r.name}</span>
        <span class="rp-emoji">${r.emoji}</span>
      </div>
      <div class="rp-text">${r.text}</div>
      <div class="rp-usage">В групі: пиши <code>${r.name}</code> + reply</div>
      <div class="rp-btns">
        <button class="rbtn green" onclick="resave('${r.name}')">🔄 Оновити в боті</button>
        <button class="rbtn" onclick="delLocal('${r.name}')">🗑️ Видалити</button>
      </div>
    </div>`).join('');
}

function resave(name) {
  const r = localFeed.find(x => x.name === name);
  if (!r) return;
  if (tg && tg.sendData) {
    tg.sendData(JSON.stringify({ action:'save_rp', name:r.name, text:r.text, emoji:r.emoji }));
  } else {
    showToast('✅ Відкрий в Telegram!');
  }
}

function delLocal(name) {
  localFeed = localFeed.filter(x => x.name !== name);
  localStorage.setItem('simon_rp_cmds', JSON.stringify(localFeed));
  document.getElementById('fcnt').textContent = localFeed.length;
  renderFeed();
  showToast('🗑️ Видалено');
}

function switchTab(tab) {
  document.getElementById('page-create').style.display = tab==='create' ? '' : 'none';
  document.getElementById('page-feed').style.display   = tab==='feed'   ? '' : 'none';
  document.getElementById('tab-create').classList.toggle('active', tab==='create');
  document.getElementById('tab-feed').classList.toggle('active', tab==='feed');
  document.getElementById('nav-create').classList.toggle('active', tab==='create');
  document.getElementById('nav-feed').classList.toggle('active', tab==='feed');
  if (tab==='feed') renderFeed();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
</script>
</body>
</html>

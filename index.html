<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>БОТ СИМОН — Портал</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Golos+Text:wght@400;500;700&display=swap');

  :root {
    --bg:       #0a0a0f;
    --card:     #12121a;
    --border:   #1e1e2e;
    --accent:   #7c3aed;
    --accent2:  #a855f7;
    --gold:     #f59e0b;
    --green:    #10b981;
    --red:      #ef4444;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --glow:     rgba(124,58,237,0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG effect */
  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168,85,247,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== HEADER ===== */
  header {
    position: relative;
    z-index: 10;
    padding: 24px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(10,10,15,0.8);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.3rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo span { font-weight: 400; opacity: 0.6; }

  .sync-status {
    font-size: 0.72rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ===== TABS ===== */
  .tabs {
    position: relative;
    z-index: 10;
    display: flex;
    gap: 4px;
    padding: 16px 20px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: all 0.2s;
    color: var(--muted);
    background: transparent;
  }
  .tab:hover { color: var(--text); border-color: var(--border); }
  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  /* ===== MAIN ===== */
  main {
    position: relative;
    z-index: 5;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 16px;
  }

  .page { display: none; animation: fadeIn 0.3s ease; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* ===== CARDS ===== */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .card-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ===== STATS GRID ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 20px;
  }

  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 16px;
    text-align: center;
    transition: border-color 0.2s;
  }
  .stat-card:hover { border-color: var(--accent); }

  .stat-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.8rem;
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent2), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-weight: 500;
  }

  /* ===== LEADERBOARD ===== */
  .player-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    cursor: pointer;
  }
  .player-row:last-child { border-bottom: none; }
  .player-row:hover { background: rgba(124,58,237,0.05); border-radius: 10px; padding-left: 8px; }

  .rank {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.8rem;
    font-weight: 900;
    min-width: 32px;
    text-align: center;
  }
  .rank.gold   { color: #f59e0b; }
  .rank.silver { color: #94a3b8; }
  .rank.bronze { color: #b45309; }
  .rank.num    { color: var(--muted); }

  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .player-info { flex: 1; min-width: 0; }
  .player-name {
    font-weight: 700;
    font-size: 0.9rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-level { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .player-stats { text-align: right; flex-shrink: 0; }
  .player-xp {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--accent2);
  }
  .player-coins { font-size: 0.72rem; color: var(--gold); margin-top: 2px; }

  /* ===== XP BAR ===== */
  .xp-bar-wrap {
    background: var(--border);
    border-radius: 99px;
    height: 6px;
    margin-top: 4px;
    overflow: hidden;
  }
  .xp-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.6s ease;
  }

  /* ===== PROFILE MODAL ===== */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    position: relative;
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: var(--border);
    border: none;
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
  }

  .modal-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--gold));
    display: flex; align-items: center; justify-content: center;
    font-size: 2rem;
    margin: 0 auto 16px;
    box-shadow: 0 0 30px var(--glow);
  }

  .modal-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.2rem;
    font-weight: 900;
    text-align: center;
    margin-bottom: 4px;
  }

  .modal-level {
    text-align: center;
    color: var(--accent2);
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 20px;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .modal-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .modal-stat-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--accent2);
  }
  .modal-stat-label {
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ===== CLANS ===== */
  .clan-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .clan-row:last-child { border-bottom: none; }

  .clan-icon {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, #1e3a5f, #1e1e2e);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.2rem;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }

  .clan-info { flex: 1; }
  .clan-name { font-weight: 700; font-size: 0.9rem; }
  .clan-meta { font-size: 0.72rem; color: var(--muted); margin-top: 2px; }

  .clan-xp {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--green);
  }

  /* ===== SHOP ===== */
  .shop-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
  }

  .shop-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px 12px;
    text-align: center;
    transition: all 0.2s;
  }
  .shop-item:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--glow);
  }

  .shop-emoji { font-size: 2rem; margin-bottom: 8px; display: block; }
  .shop-name { font-size: 0.8rem; font-weight: 600; margin-bottom: 4px; }
  .shop-type { font-size: 0.68rem; color: var(--muted); }

  /* ===== PAIRS ===== */
  .pair-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.85rem;
  }
  .pair-row:last-child { border-bottom: none; }
  .pair-heart { font-size: 1.2rem; }
  .pair-names { flex: 1; }
  .pair-date { font-size: 0.7rem; color: var(--muted); }

  /* ===== ADMIN ===== */
  .admin-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 12px;
  }

  .admin-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    transition: border-color 0.2s;
  }
  .admin-card:hover { border-color: var(--accent); }

  .admin-card-label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }
  .admin-card-val {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--text);
  }

  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 99px;
    font-size: 0.68rem;
    font-weight: 700;
    background: rgba(124,58,237,0.2);
    color: var(--accent2);
    border: 1px solid rgba(124,58,237,0.3);
  }

  /* ===== LOADING ===== */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    margin: 0 auto 16px;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 16px;
    color: var(--red);
    text-align: center;
    font-size: 0.85rem;
  }

  /* ===== SEARCH ===== */
  .search-wrap {
    position: relative;
    margin-bottom: 16px;
  }
  .search-input {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px 10px 38px;
    color: var(--text);
    font-family: 'Golos Text', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
  }

  /* ===== SORT TABS ===== */
  .sort-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .sort-tab {
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 0.75rem;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--border);
    color: var(--muted);
    background: transparent;
    transition: all 0.15s;
  }
  .sort-tab:hover { color: var(--text); }
  .sort-tab.active {
    background: rgba(124,58,237,0.2);
    border-color: var(--accent);
    color: var(--accent2);
  }

  .section-title {
    font-family: 'Unbounded', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    margin-bottom: 16px;
    background: linear-gradient(90deg, var(--text), var(--muted));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  @media (max-width: 480px) {
    .stat-val { font-size: 1.4rem; }
    .modal { padding: 20px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">СИМОН <span>v4.0</span></div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncTime">Завантаження...</span>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('leaderboard')">🏆 Рейтинг</div>
  <div class="tab" onclick="switchTab('clans')">🏴 Клани</div>
  <div class="tab" onclick="switchTab('shop')">🛒 Магазин</div>
  <div class="tab" onclick="switchTab('pairs')">💕 Пари</div>
  <div class="tab" onclick="switchTab('admin')">🔧 Адмін</div>
</div>

<main>

  <!-- ===== LEADERBOARD ===== -->
  <div class="page active" id="page-leaderboard">
    <div class="stats-grid" id="globalStats"></div>

    <div class="card">
      <div class="card-title">Топ гравців</div>

      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="searchInput" placeholder="Пошук гравця..." oninput="filterPlayers()">
      </div>

      <div class="sort-tabs">
        <div class="sort-tab active" onclick="sortBy('xp')">⚡ XP</div>
        <div class="sort-tab" onclick="sortBy('coins')">💰 Монети</div>
        <div class="sort-tab" onclick="sortBy('total_wins')">🏆 Перемоги</div>
        <div class="sort-tab" onclick="sortBy('snake_best')">🐍 Змійка</div>
        <div class="sort-tab" onclick="sortBy('achievements')">🏅 Досягнення</div>
      </div>

      <div id="playerList">
        <div class="loading"><div class="spinner"></div>Завантаження...</div>
      </div>
    </div>
  </div>

  <!-- ===== CLANS ===== -->
  <div class="page" id="page-clans">
    <div class="card">
      <div class="card-title">Рейтинг кланів</div>
      <div id="clanList">
        <div class="loading"><div class="spinner"></div>Завантаження...</div>
      </div>
    </div>
  </div>

  <!-- ===== SHOP ===== -->
  <div class="page" id="page-shop">
    <div class="card">
      <div class="card-title">Предмети магазину</div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
  </div>

  <!-- ===== PAIRS ===== -->
  <div class="page" id="page-pairs">
    <div class="card">
      <div class="card-title">Зареєстровані пари</div>
      <div id="pairsList">
        <div class="loading"><div class="spinner"></div>Завантаження...</div>
      </div>
    </div>
  </div>

  <!-- ===== ADMIN ===== -->
  <div class="page" id="page-admin">
    <div class="section-title">Загальна статистика</div>
    <div class="admin-grid" id="adminGrid"></div>

    <br>
    <div class="section-title">Топ 5 активних</div>
    <div class="card" id="adminTop"></div>
  </div>

</main>

<!-- PROFILE MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent"></div>
</div>

<script>
const BIN_ID  = "69c4ac57b7ec241ddca4251c";
const API_KEY = "$2a$10$3mHD86jkJ6I01vu8PfE3qOdLvkey.CY/LPy/h8.yxxqnq0IxzlZ42";
const URL     = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;

let DATA         = null;
let currentSort  = "xp";
let filteredList = [];

const LEVELS = [
  [0,"Новачок"],[200,"Учень"],[500,"Гравець"],[1000,"Досвідчений"],
  [2000,"Майстер"],[4000,"Легенда"],[8000,"Герой"],[15000,"Зірка"],
  [30000,"Елітний"],[60000,"Симон"],
];
const LEVEL_EMOJIS = ["🥉","🥈","🥇","💎","🏆","👑","⚡","🌟","🔥","🎖"];

function getLevel(xp) {
  let lv = 0;
  for (let i = 0; i < LEVELS.length; i++) {
    if (xp >= LEVELS[i][0]) lv = i;
  }
  const next = LEVELS[lv + 1];
  const prev = LEVELS[lv];
  const pct  = next ? Math.round((xp - prev[0]) / (next[0] - prev[0]) * 100) : 100;
  return { lv, name: LEVEL_EMOJIS[lv] + " " + LEVELS[lv][1], pct };
}

function rankLabel(i) {
  if (i === 0) return '<span class="rank gold">🥇</span>';
  if (i === 1) return '<span class="rank silver">🥈</span>';
  if (i === 2) return '<span class="rank bronze">🥉</span>';
  return `<span class="rank num">${i + 1}</span>`;
}

function getInitial(name) {
  return name ? name[0].toUpperCase() : "?";
}

// ===== FETCH DATA =====
async function fetchData() {
  try {
    const res = await fetch(URL);
    if (!res.ok) throw new Error("HTTP " + res.status);
    const json = await res.json();
    DATA = json.record;

    const d = new Date(DATA.updated_at * 1000);
    document.getElementById("syncTime").textContent =
      "Оновлено: " + d.toLocaleTimeString("uk-UA", { hour: "2-digit", minute: "2-digit" });

    renderAll();
  } catch (e) {
    document.getElementById("playerList").innerHTML =
      `<div class="error-box">❌ Помилка завантаження даних<br><small>${e.message}</small><br><br>Переконайся що бот вже відправив дані в JSONBin</div>`;
    document.getElementById("syncTime").textContent = "Помилка";
    document.getElementById("syncDot").style.background = "#ef4444";
  }
}

function renderAll() {
  renderGlobalStats();
  renderLeaderboard();
  renderClans();
  renderShop();
  renderPairs();
  renderAdmin();
}

// ===== GLOBAL STATS =====
function renderGlobalStats() {
  const d = DATA;
  document.getElementById("globalStats").innerHTML = `
    <div class="stat-card">
      <div class="stat-val">${d.total_players}</div>
      <div class="stat-label">👥 Гравців</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${d.total_games.toLocaleString()}</div>
      <div class="stat-label">🎮 Ігор зіграно</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${d.total_coins.toLocaleString()}</div>
      <div class="stat-label">💰 Монет в обігу</div>
    </div>
    <div class="stat-card">
      <div class="stat-val">${d.top_clans.length}</div>
      <div class="stat-label">🏴 Кланів</div>
    </div>
  `;
}

// ===== LEADERBOARD =====
function renderLeaderboard() {
  filteredList = [...(DATA.top_players || [])];
  applySort();
}

function sortBy(key) {
  currentSort = key;
  document.querySelectorAll(".sort-tab").forEach(t => t.classList.remove("active"));
  event.target.classList.add("active");
  applySort();
}

function applySort() {
  const q = (document.getElementById("searchInput")?.value || "").toLowerCase();
  let list = [...(DATA.top_players || [])];
  if (q) list = list.filter(p => p.name.toLowerCase().includes(q));
  list.sort((a, b) => (b[currentSort] || 0) - (a[currentSort] || 0));
  renderPlayerList(list);
}

function filterPlayers() { applySort(); }

function renderPlayerList(list) {
  if (!list.length) {
    document.getElementById("playerList").innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px">Нікого не знайдено</div>';
    return;
  }
  document.getElementById("playerList").innerHTML = list.map((p, i) => {
    const lvl = getLevel(p.xp);
    const wr  = p.total_games ? Math.round(p.total_wins / p.total_games * 100) : 0;
    return `
      <div class="player-row" onclick="openProfile(${JSON.stringify(p).replace(/"/g,'&quot;')})">
        ${rankLabel(i)}
        <div class="avatar">${getInitial(p.name)}</div>
        <div class="player-info">
          <div class="player-name">${escHtml(p.name)}</div>
          <div class="player-level">${lvl.name}</div>
          <div class="xp-bar-wrap"><div class="xp-bar-fill" style="width:${lvl.pct}%"></div></div>
        </div>
        <div class="player-stats">
          <div class="player-xp">${p[currentSort]?.toLocaleString() || 0}</div>
          <div class="player-coins">${wr}% WR</div>
        </div>
      </div>
    `;
  }).join("");
}

// ===== PROFILE MODAL =====
function openProfile(p) {
  const lvl = getLevel(p.xp);
  const wr  = p.total_games ? Math.round(p.total_wins / p.total_games * 100) : 0;
  document.getElementById("modalContent").innerHTML = `
    <button class="modal-close" onclick="document.getElementById('overlay').classList.remove('open')">✕</button>
    <div class="modal-avatar">${getInitial(p.name)}</div>
    <div class="modal-name">${escHtml(p.name)}</div>
    <div class="modal-level">${lvl.name}</div>
    <div class="xp-bar-wrap" style="margin-bottom:20px">
      <div class="xp-bar-fill" style="width:${lvl.pct}%"></div>
    </div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val">${p.xp.toLocaleString()}</div>
        <div class="modal-stat-label">⚡ XP</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.coins.toLocaleString()}</div>
        <div class="modal-stat-label">💰 Монети</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.total_wins}</div>
        <div class="modal-stat-label">🏆 Перемог</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${wr}%</div>
        <div class="modal-stat-label">📊 Вінрейт</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.snake_best}</div>
        <div class="modal-stat-label">🐍 Змійка</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.achievements}</div>
        <div class="modal-stat-label">🏅 Досягнень</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.daily_streak}</div>
        <div class="modal-stat-label">📅 Стрік</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val">${p.season_xp.toLocaleString()}</div>
        <div class="modal-stat-label">🌸 Сезон XP</div>
      </div>
    </div>
  `;
  document.getElementById("overlay").classList.add("open");
}

function closeModal(e) {
  if (e.target === document.getElementById("overlay"))
    document.getElementById("overlay").classList.remove("open");
}

// ===== CLANS =====
function renderClans() {
  const list = DATA.top_clans || [];
  if (!list.length) {
    document.getElementById("clanList").innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px">Кланів ще немає</div>';
    return;
  }
  document.getElementById("clanList").innerHTML = list.map((c, i) => `
    <div class="clan-row">
      ${rankLabel(i)}
      <div class="clan-icon">🏴</div>
      <div class="clan-info">
        <div class="clan-name">${escHtml(c.name)}</div>
        <div class="clan-meta">👑 ${escHtml(c.leader)} · 👥 ${c.members} · Lv${c.level}</div>
      </div>
      <div class="clan-xp">⚡ ${c.xp.toLocaleString()}</div>
    </div>
  `).join("");
}

// ===== SHOP =====
function renderShop() {
  const items = DATA.shop_items || {};
  const TYPE_LABEL = { theme: "🎨 Тема", avatar: "👤 Аватар", title: "📛 Титул" };
  document.getElementById("shopGrid").innerHTML = Object.entries(items).map(([id, name]) => {
    const type = id.split("_")[0];
    const parts = name.split(" ");
    const emoji = parts[0];
    const nm    = parts.slice(1).join(" ");
    return `
      <div class="shop-item">
        <span class="shop-emoji">${emoji}</span>
        <div class="shop-name">${escHtml(nm)}</div>
        <div class="shop-type">${TYPE_LABEL[type] || type}</div>
      </div>
    `;
  }).join("");
}

// ===== PAIRS =====
function renderPairs() {
  const list = DATA.pairs || [];
  if (!list.length) {
    document.getElementById("pairsList").innerHTML = '<div style="text-align:center;color:var(--muted);padding:32px">Пар ще немає</div>';
    return;
  }
  document.getElementById("pairsList").innerHTML = list.map(p => `
    <div class="pair-row">
      <div class="pair-heart">💍</div>
      <div class="pair-names">
        <strong>${escHtml(p.name1)}</strong> &amp; <strong>${escHtml(p.name2)}</strong>
        <div class="pair-date">📅 ${p.date}</div>
      </div>
    </div>
  `).join("");
}

// ===== TABS =====
function switchTab(name) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("page-" + name).classList.add("active");
  event.target.classList.add("active");
}

// ===== UTILS =====
function escHtml(str) {
  return String(str || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

fetchData();
setInterval(fetchData, 60000); // оновлення кожну хвилину
